name: Deploy to Firebase

on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Build
        run: npm run build

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIVORA_MVP }}
        run: echo "$SA_JSON" > /tmp/gsa.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting and functions
        run: firebase deploy --only hosting:munia-page,functions --project civora-mvp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gsa.json
