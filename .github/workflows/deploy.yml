name: Deploy to Firebase

on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== functions/ ===" && ls functions/ || true
          echo "=== functions/dist/ ===" && ls functions/dist/ || true
          echo "=== root dist/ ===" && ls dist/ || true
          ls functions/dist/client/

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting and functions
        run: firebase deploy --only hosting:munia-page,functions --project civora-mvp
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
